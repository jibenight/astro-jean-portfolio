# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: jibenight/astro-jean-portfolio
  branch: main
  base_url: https://sveltia-cms-auth.jean-nguyen.workers.dev
  auth_methods: [oauth]

media_folder: src/assets/images/images_portfolio
public_folder: /images/portfolio

media_libraries:
  all:
    max_file_size: 5242880
    slugify_filename: true
    transformations:
      raster_image:
        format: webp
        quality: 85
        width: 1600
        height: 1600

collections:
  - name: portfolio
    label: Portfolio
    label_singular: Projet
    folder: src/content/portfolio
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: '{{slug}}'
    summary: '{{title}} — {{date}}'
    sortable_fields:
      fields: [title, date]
      default:
        field: date
        direction: descending
    fields:
      - label: Titre
        name: title
        widget: string
      - label: Texte alternatif de l’image
        name: alt
        widget: string
        hint: Décrivez brièvement l’image pour l’accessibilité.
      - label: Image
        name: image
        widget: image
      - label: Description de la réalisation
        name: creation
        widget: text
      - label: Résumé de l’étude de cas
        name: summary
        widget: text
        required: false
      - label: Mon rôle
        name: role
        widget: string
        required: false
      - label: Problématique
        name: challenge
        widget: text
        required: false
      - label: Solution apportée
        name: solution
        widget: text
        required: false
      - label: Résultats
        name: results
        widget: list
        required: false
        default: []
      - label: Témoignage
        name: testimonial
        widget: text
        required: false
      - label: Date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        format: YYYY-MM-DD
      - label: Technologies
        name: logos
        widget: select
        multiple: true
        options:
          - { label: Astro, value: astro }
          - { label: CSS, value: css3 }
          - { label: Express, value: express }
          - { label: Ghost, value: ghost }
          - { label: Handlebars, value: handlebars }
          - { label: HTML, value: html5 }
          - { label: JavaScript, value: js }
          - { label: Node.js, value: nodejs }
          - { label: Python, value: python }
          - { label: React, value: react }
          - { label: WordPress, value: wordpress }
      - label: Catégorie
        name: category
        widget: select
        required: false
        options: [Custom build, WordPress, Ghost / Headless]
      - label: Mettre en avant
        name: featured
        widget: boolean
        default: false
      - label: Statut
        name: status
        widget: select
        default: online
        options:
          - { label: En ligne, value: online }
          - { label: Archivé, value: archived }
      - label: URL du site
        name: href
        widget: string
        pattern:
          - '^https?://.+'
          - Saisissez une URL commençant par http:// ou https://
      - label: URL GitHub
        name: github
        widget: string
        required: false
        pattern:
          - '^https?://.+'
          - Saisissez une URL commençant par http:// ou https://
